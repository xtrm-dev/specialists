name: Semgrep

# SAST scanner — replaces CodeQL on private user-owned repos where GitHub
# Advanced Security is unavailable. Free, runs entirely in CI.
#
# Diff-aware: on PRs, semgrep ci auto-compares HEAD against the base branch
# and only flags NEW findings. We do NOT trigger on push to main because
# `semgrep ci` has no baseline there and would re-flag pre-existing debt
# every commit. The weekly schedule covers the full-scan use case.

on:
  pull_request:
    branches: [main, master]
  schedule:
    - cron: "0 6 * * 1"  # Monday 06:00 UTC weekly

permissions:
  contents: read

jobs:
  semgrep:
    name: Semgrep scan
    runs-on: ${{ fromJSON(vars.CI_RUNNER || '["self-hosted","linux","mercury-lite","specialists"]') }}
    timeout-minutes: 15
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0  # full history for baseline diff

      - name: Install semgrep
        run: |
          SEMGREP_VERSION=1.99.0
          python3 -m venv /tmp/semgrep-venv
          /tmp/semgrep-venv/bin/pip install --quiet "semgrep==${SEMGREP_VERSION}"
          /tmp/semgrep-venv/bin/semgrep --version

      - name: Scan
        run: |
          # Diff-baseline behaviour: only fail on NEW findings vs main.
          # On push-to-main or schedule (no baseline ref available), full
          # scan runs and pre-existing debt will surface as INFO; --error
          # still gates new issues only because semgrep-baseline excludes
          # historical findings.
          BASELINE_ARGS=()
          if [ "${GITHUB_EVENT_NAME}" = "pull_request" ]; then
            BASELINE_ARGS=(--baseline-commit "origin/${GITHUB_BASE_REF}")
            git fetch --no-tags --depth=200 origin "${GITHUB_BASE_REF}" || true
          fi
          /tmp/semgrep-venv/bin/semgrep scan \
            --config=p/default \
            --config=p/security-audit \
            --config=p/secrets \
            --config=p/python \
            --config=p/dockerfile \
            --config=p/github-actions \
            --error \
            --skip-unknown-extensions \
            "${BASELINE_ARGS[@]}"