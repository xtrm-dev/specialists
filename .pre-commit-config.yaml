# Pre-commit — local mirror of CI security gates.
#
# Two stages:
#   - commit  → fast checks (gitleaks staged-diff, ruff, hygiene)  ~1s
#   - push    → heavy checks (semgrep, osv-scanner)               ~30s
#
# This repo uses core.hooksPath=.githooks. The commit hook invokes
# pre-commit; the push hook runs the heavy checks directly to avoid mutating
# unrelated files during push.

minimum_pre_commit_version: 3.5.0
default_install_hook_types: [pre-commit, pre-push]
default_stages: [pre-commit]  # hooks opt in to pre-push via explicit stages: [pre-push]

repos:
  # ── commit stage: fast hygiene + secret scan ──────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        args: [--allow-multiple-documents]
      - id: check-json
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=1024]
      - id: detect-private-key

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks  # uses .gitleaks.toml allowlist

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.4
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  # ── push stage: heavy SAST + vuln scans (mirror of CI) ────────────────────
  - repo: local
    hooks:
      - id: semgrep
        name: semgrep (push, diff-only vs upstream)
        stages: [pre-push]
        language: system
        pass_filenames: false
        entry: ./scripts/semgrep-diff.sh

  - repo: local
    hooks:
      - id: osv-scanner
        name: osv-scanner (push, informational)
        stages: [pre-push]
        language: system
        pass_filenames: false
        # OSV has no diff-baseline mode for lockfiles; keep local push scans
        # informational so pre-existing dependency debt does not block pushes.
        # CI remains the authoritative full-repo vulnerability gate.
        entry: bash -c 'if command -v osv-scanner >/dev/null; then osv-scanner --recursive ./ || true; else echo "osv-scanner not installed locally — skipping (CI covers it)"; fi'
